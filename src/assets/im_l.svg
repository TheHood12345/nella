<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100">
    <circle cx="0" cy="2" r="1" fill="white">
        <animate attributeName="cx" from="0" to="120" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="3" r="1" fill="white">
        <animate attributeName="cx" from="0" to="120" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- end -->
    <circle cx="100" cy="5" r="10" fill="white">
        <animate attributeName="r" from="3" to="10" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="5" r="17" fill="rgba(255,255,255,0.831)">
        <animate attributeName="r" from="3" to="10" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="5" r="17" fill="rgba(255,255,255,0.831)">
        <animate attributeName="r" from="3" to="20" dur="0.8s" repeatCount="indefinite"/>
    </circle>

    <!-- start -->
    <circle cx="0" cy="5" r="10" fill="rgba(255,255,255,0.7)">
        <animate attributeName="r" from="3" to="20" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="5" r="17" fill="rgba(255,255,255,0.7)">
        <animate attributeName="r" values="3;20;3" dur="5s" repeatCount="indefinite"/>
    </circle>
</svg>